<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ROI Annotation Portal — Schüle Lab</title>
<style>
:root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --accent: #00e676; --gold: #ffd700; --blue: #58a6ff; --red: #ff4444; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
.header { background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
.header h1 { font-size: 24px; color: var(--accent); }
.header .subtitle { color: #8b949e; font-size: 14px; }
.logo { width: 36px; height: 36px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.layout { display: grid; grid-template-columns: 320px 1fr 380px; height: calc(100vh - 70px); }
.panel { border-right: 1px solid var(--border); overflow-y: auto; padding: 15px; }
.panel h2 { font-size: 16px; color: var(--gold); margin-bottom: 12px; }
.search { width: 100%; padding: 8px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; margin-bottom: 12px; outline: none; }
.search:focus { border-color: var(--accent); }
.region-item { padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; margin-bottom: 2px; transition: background 0.15s; }
.region-item:hover { background: #21262d; }
.region-item.selected { background: #1a3a2a; border: 1px solid var(--accent); }
.region-item .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.region-item .name { flex: 1; }
.region-item .acr { color: var(--blue); font-weight: 600; min-width: 40px; }
.depth-0 { padding-left: 5px; font-weight: 700; }
.depth-1 { padding-left: 15px; font-weight: 600; }
.depth-2 { padding-left: 25px; }
.depth-3 { padding-left: 35px; font-size: 12px; }
.depth-4 { padding-left: 45px; font-size: 12px; color: #8b949e; }
.viewer { background: #000; display: flex; flex-direction: column; }
.viewer iframe { flex: 1; border: none; }
.viewer-label { padding: 8px 15px; background: var(--card); color: #8b949e; font-size: 12px; border-bottom: 1px solid var(--border); }
.right-panel { padding: 15px; overflow-y: auto; }
.roi-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.roi-card h3 { font-size: 14px; color: var(--accent); margin-bottom: 6px; }
.roi-card .meta { font-size: 12px; color: #8b949e; margin-bottom: 8px; }
.roi-card select, .roi-card input { width: 100%; padding: 6px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 13px; margin-top: 4px; }
.roi-card select { cursor: pointer; }
.roi-card label { font-size: 12px; color: #8b949e; display: block; margin-top: 6px; }
.roi-card .remove { color: var(--red); cursor: pointer; font-size: 12px; float: right; }
.btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; width: 100%; margin-top: 10px; }
.btn-export { background: var(--accent); color: #000; }
.btn-export:hover { background: #00c964; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-primary { background: #1a3a2a; color: var(--accent); }
.badge-secondary { background: #2a2a1a; color: var(--gold); }
.badge-tertiary { background: #1a1a2a; color: var(--blue); }
.count { background: var(--accent); color: #000; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 700; }
.empty-state { text-align: center; padding: 40px 20px; color: #8b949e; }
.empty-state .icon { font-size: 48px; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🧠</div>
  <div>
    <h1>ROI Annotation Portal</h1>
    <div class="subtitle">Schüle Lab α-Synuclein Study — Allen CCFv3 Atlas — Select regions for ABBA registration & SITP bridge</div>
  </div>
  <div style="margin-left:auto">
    <span class="count" id="roi-count">0</span> ROIs selected
  </div>
</div>

<div class="layout">
  <!-- LEFT: Region Browser -->
  <div class="panel" id="browser-panel">
    <h2>🔍 Brain Regions</h2>
    <input type="text" class="search" id="search" placeholder="Search regions (e.g. striatum, SNc, VTA...)">
    <div id="region-list"></div>
  </div>

  <!-- CENTER: Atlas Viewer -->
  <div class="viewer">
    <div class="viewer-label">Allen Mouse Brain Reference Atlas — Click regions in the left panel to annotate. Interactive 3D viewer below.</div>
    <iframe id="atlas-frame" src="https://atlas.brain-map.org/atlas?atlas=2#atlas=2&plate=100960440&structure=&x=5279.666748046875&y=3743.666748046875&zoom=-3&resolution=16.75&z=5&annotation=true" allow="fullscreen"></iframe>
  </div>

  <!-- RIGHT: Selected ROIs -->
  <div class="right-panel" id="right-panel">
    <h2>📌 Selected ROIs</h2>
    <div id="selected-list"></div>
    <button class="btn btn-export" onclick="exportCSV()">📥 Export ROIs as CSV</button>
  </div>
</div>

<script>
// Allen CCFv3 ontology (loaded from API)
let allRegions = [];
let selectedROIs = {};

// Suggested ROIs for alpha-synuclein PD study
const SUGGESTED = {
  "SNc": { priority: "Primary", notes: "DA neuron loss in PD — primary site" },
  "SNr": { priority: "Primary", notes: "GABAergic output nucleus" },
  "VTA": { priority: "Primary", notes: "DA neurons, less vulnerable than SNc" },
  "CP":  { priority: "Primary", notes: "Striatum — nigrostriatal DA target" },
  "ACB": { priority: "Primary", notes: "Nucleus accumbens, ventral striatum" },
  "SSp": { priority: "Secondary", notes: "Somatomotor network (strongest FC signal)" },
  "MOp": { priority: "Secondary", notes: "Primary motor cortex" },
  "RSP": { priority: "Secondary", notes: "Default mode-like network in mice" },
  "ACA": { priority: "Secondary", notes: "Anterior cingulate, FC hub" },
  "AI":  { priority: "Secondary", notes: "Insular cortex, lateral network" },
  "HIP": { priority: "Tertiary", notes: "Spp1 (DAM marker) SVG enrichment" },
  "TH":  { priority: "Tertiary", notes: "Thalamo-cortical connectivity" },
  "CB":  { priority: "Tertiary", notes: "Brainstem-cerebellar circuits" },
  "HY":  { priority: "Tertiary", notes: "Autonomic, non-motor PD symptoms" },
};

// Load ontology
fetch("https://api.brain-map.org/api/v2/structure_graph_download/1.json")
  .then(r => r.json())
  .then(data => {
    function walk(node, depth) {
      allRegions.push({
        id: node.id, acronym: node.acronym, name: node.name,
        color: "#" + (node.color_hex_triplet || "CCCCCC"), depth: Math.min(depth, 4),
        parent_id: node.parent_structure_id
      });
      (node.children || []).forEach(c => walk(c, depth + 1));
    }
    walk(data.msg[0], 0);
    
    // Pre-select suggested ROIs
    for (const [acr, info] of Object.entries(SUGGESTED)) {
      const r = allRegions.find(x => x.acronym === acr);
      if (r) selectedROIs[acr] = { ...r, ...info };
    }
    
    renderRegions();
    renderSelected();
  })
  .catch(e => {
    document.getElementById("region-list").innerHTML = `<div class="empty-state"><div class="icon">⚠️</div>Failed to load atlas. Using offline fallback.</div>`;
  });

function renderRegions(filter = "") {
  const container = document.getElementById("region-list");
  const q = filter.toLowerCase();
  
  // If searching, show flat results. Otherwise show hierarchy (top 3 levels)
  let items;
  if (q) {
    items = allRegions.filter(r => r.acronym.toLowerCase().includes(q) || r.name.toLowerCase().includes(q)).slice(0, 50);
  } else {
    items = allRegions.filter(r => r.depth <= 3).slice(0, 200);
  }
  
  container.innerHTML = items.map(r => {
    const sel = r.acronym in selectedROIs;
    return `<div class="region-item depth-${r.depth} ${sel ? 'selected' : ''}" onclick="toggleROI('${r.acronym}')">
      <div class="dot" style="background:${r.color}"></div>
      <span class="acr">${r.acronym}</span>
      <span class="name">${r.name}</span>
      ${sel ? '✓' : ''}
    </div>`;
  }).join("");
}

function toggleROI(acronym) {
  if (acronym in selectedROIs) {
    delete selectedROIs[acronym];
  } else {
    const r = allRegions.find(x => x.acronym === acronym);
    if (r) selectedROIs[acronym] = { ...r, priority: "Secondary", notes: "" };
  }
  renderRegions(document.getElementById("search").value);
  renderSelected();
}

function renderSelected() {
  const container = document.getElementById("selected-list");
  const count = Object.keys(selectedROIs).length;
  document.getElementById("roi-count").textContent = count;
  
  if (count === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🎯</div><p>Click regions in the left panel to add them</p></div>`;
    return;
  }
  
  // Group by priority
  const groups = { Primary: [], Secondary: [], Tertiary: [] };
  for (const [acr, r] of Object.entries(selectedROIs)) {
    (groups[r.priority] || groups.Secondary).push({ acr, ...r });
  }
  
  let html = "";
  for (const [prio, rois] of Object.entries(groups)) {
    if (rois.length === 0) continue;
    const badgeClass = prio === "Primary" ? "badge-primary" : prio === "Secondary" ? "badge-secondary" : "badge-tertiary";
    html += `<div style="margin:10px 0 5px"><span class="badge ${badgeClass}">${prio} (${rois.length})</span></div>`;
    for (const r of rois) {
      html += `<div class="roi-card">
        <span class="remove" onclick="toggleROI('${r.acr}')">✕ remove</span>
        <h3>${r.acr} — ${r.name}</h3>
        <div class="meta">ID: ${r.id} | Color: <span style="color:${r.color}">■</span> ${r.color}</div>
        <label>Priority</label>
        <select onchange="selectedROIs['${r.acr}'].priority=this.value; renderSelected()">
          <option ${r.priority==='Primary'?'selected':''}>Primary</option>
          <option ${r.priority==='Secondary'?'selected':''}>Secondary</option>
          <option ${r.priority==='Tertiary'?'selected':''}>Tertiary</option>
        </select>
        <label>Notes</label>
        <input type="text" value="${r.notes||''}" oninput="selectedROIs['${r.acr}'].notes=this.value" placeholder="Rationale, relevant genes...">
      </div>`;
    }
  }
  container.innerHTML = html;
}

function exportCSV() {
  let csv = "Acronym,Name,ID,Priority,Notes,Color\n";
  for (const [acr, r] of Object.entries(selectedROIs)) {
    csv += `"${acr}","${r.name}",${r.id},"${r.priority}","${(r.notes||'').replace(/"/g,'""')}","${r.color}"\n`;
  }
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "roi_selections.csv"; a.click();
  URL.revokeObjectURL(url);
}

document.getElementById("search").addEventListener("input", e => renderRegions(e.target.value));
</script>
</body>
</html>
